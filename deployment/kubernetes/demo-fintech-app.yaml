apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-fintech
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-fintech
  template:
    metadata:
      labels:
        app: demo-fintech
    spec:
      containers:
      - name: fintech-app
        image: fintech-demo:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-fintech
  namespace: demo
spec:
  type: NodePort
  selector:
    app: demo-fintech
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
