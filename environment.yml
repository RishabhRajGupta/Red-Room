name: redroom
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # Core dependencies
    - flask==3.0.0
    - flask-socketio==5.3.5
    - python-socketio==5.10.0
    - httpx==0.25.2
    - beautifulsoup4==4.12.2
    - structlog==23.2.0
    - click==8.1.7
    - pyyaml==6.0.1
    - python-dotenv==1.0.0
    
    # PDF generation
    - reportlab==4.0.7
    - matplotlib==3.8.2
    - pillow==10.1.0
    
    # AI/ML dependencies (optional, for future agent features)
    - langchain==0.1.0
    - langgraph==0.0.20
    
    # Testing dependencies
    - pytest==7.4.3
    - pytest-asyncio==0.21.1
    
    # Development dependencies
    - black==23.12.1
    - flake8==6.1.0
    - mypy==1.7.1
