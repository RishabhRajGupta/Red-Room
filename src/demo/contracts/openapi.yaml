openapi: 3.0.0
info:
  title: Demo Fintech API
  version: 1.0.0
  description: Demo financial application with transfer functionality

servers:
  - url: http://localhost:8080

paths:
  /balance/{account_id}:
    get:
      summary: Get account balance
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                  balance:
                    type: number

  /transfer:
    post:
      summary: Transfer funds between accounts
      description: |
        Transfer funds from one account to another.
        BUSINESS LOGIC REQUIREMENT: Must ensure atomic balance check and deduction.
        INVARIANT: Balance must never go negative.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from_account
                - to_account
                - amount
              properties:
                from_account:
                  type: string
                to_account:
                  type: string
                amount:
                  type: number
                  minimum: 0.01
      responses:
        '200':
          description: Transfer result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
